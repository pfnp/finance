<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карты</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Карты</div>

<div class="balance" id="totalCards">Всего на картах: 0 ₽</div>

<div class="add-btn" onclick="openModal()">Добавить карту</div>
<div class="list" id="cardsList"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <input id="cardName" placeholder="Название карты">
    <input id="cardAmount" placeholder="Сумма на карте">
    <div class="save" onclick="saveCard()">Сохранить</div>
  </div>
</div>

<div class="tabbar">
  <a class="tab" href="index.html">Финансы</a>
  <a class="tab" href="subscriptions.html">Подписки</a>
  <a class="tab active" href="cards.html">Карты</a>
</div>

<script>
let cards = JSON.parse(localStorage.getItem('cards')) || [];

const colors = { "Карта": "#3498db" };

function openModal(){document.getElementById('modalBg').style.display='block';}
function closeModal(){document.getElementById('modalBg').style.display='none';}

function renderCards(){
  const list = document.getElementById('cardsList');
  list.innerHTML = '';
  let total = 0;

  cards.forEach((c,i)=>{
    total += c.amount;

    const div = document.createElement('div');
    div.className = 'item';
    div.style.backgroundColor = colors["Карта"];
    div.innerHTML = `<div>${c.name}</div><span>${c.amount} ₽</span>`;

    const del = document.createElement('div');
    del.className = 'delete';
    del.innerText = 'Удалить';
    del.onclick = ()=>deleteCard(i);

    const wrapper = document.createElement('div');
    wrapper.className = 'wrapper';
    wrapper.appendChild(del);
    wrapper.appendChild(div);

    list.appendChild(wrapper);
  });

  document.getElementById('totalCards').innerText = `Всего на картах: ${total} ₽`;
}

function saveCard(){
  const name = document.getElementById('cardName').value;
  const amount = parseInt(document.getElementById('cardAmount').value);
  if(!name || isNaN(amount)) return;

  cards.push({name, amount});
  localStorage.setItem('cards', JSON.stringify(cards));

  document.getElementById('cardName').value='';
  document.getElementById('cardAmount').value='';
  closeModal();
  renderCards();
}

function deleteCard(i){
  cards.splice(i,1);
  localStorage.setItem('cards', JSON.stringify(cards));
  renderCards();
}

renderCards();
</script>
</body>
</html>
