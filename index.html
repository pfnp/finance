<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Финансы</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: -apple-system;
}

/* ЭКРАНЫ */
.screen {
  display: none;
  padding-bottom: 80px;
}

.active {
  display: block;
}

/* HEADER */
.header {
  padding: 20px;
  font-size: 24px;
}

.balance {
  padding: 0 20px;
  font-size: 32px;
  font-weight: bold;
}

/* КНОПКА */
.add-btn {
  margin: 20px;
  padding: 15px;
  background: yellow;
  color: black;
  text-align: center;
  border-radius: 12px;
}

/* СПИСОК */
.list {
  padding: 20px;
}

.wrapper {
  position: relative;
  margin-bottom: 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-radius: 10px;
  background: #1a1a1a;
}

.delete {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 80px;
  background: #ff3b30;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
}

.income { color: #4cd964; }
.expense { color: #ff3b30; }

.category {
  font-size: 12px;
  opacity: 0.6;
}

/* МОДАЛКА */
.modal-bg {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
}

.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #222;
  padding: 20px;
  border-radius: 20px 20px 0 0;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
}

.save {
  background: yellow;
  padding: 15px;
  text-align: center;
  border-radius: 10px;
  color: black;
}

/* ТАБ БАР */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #1a1a1a;
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1px solid #333;
}

.tab {
  color: gray;
}

.tab.active {
  color: yellow;
}
</style>
</head>

<body>

<!-- ОПЕРАЦИИ -->
<div id="operations" class="screen active">
  <div class="header">Финансы</div>
  <div class="balance" id="balance">0 ₽</div>
  <div class="add-btn" onclick="openModal()">Добавить</div>
  <div class="list" id="list"></div>
</div>

<!-- ПОДПИСКИ -->
<div id="subscriptions" class="screen">
  <div class="header">Подписки</div>
</div>

<!-- КАРТЫ -->
<div id="cards" class="screen">
  <div class="header">Карты</div>
</div>

<!-- МОДАЛКА -->
<div class="modal-bg" id="modalBg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <input id="name" placeholder="Название">
    
    <select id="category">
      <option>Еда</option>
      <option>Транспорт</option>
      <option>Подписки</option>
      <option>Развлечения</option>
      <option>Другое</option>
    </select>

    <input id="amount" placeholder="Сумма (+ доход / - расход)">
    <div class="save" onclick="save()">Сохранить</div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tabbar">
  <div class="tab active" onclick="switchTab('operations', this)">Операции</div>
  <div class="tab" onclick="switchTab('subscriptions', this)">Подписки</div>
  <div class="tab" onclick="switchTab('cards', this)">Карты</div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem('tx')) || [];

function switchTab(id, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function render() {
  const list = document.getElementById('list');
  const balance = document.getElementById('balance');

  list.innerHTML = '';
  let total = 0;

  transactions.forEach((t, i) => {
    total += t.amount;

    const wrapper = document.createElement('div');
    wrapper.className = 'wrapper';

    const del = document.createElement('div');
    del.className = 'delete';
    del.innerText = 'Удалить';
    del.onclick = () => deleteItem(i);

    const div = document.createElement('div');
    div.className = 'item';

    const colorClass = t.amount > 0 ? 'income' : 'expense';

    div.innerHTML = `
      <div>
        <div>${t.name}</div>
        <div class="category">${t.category}</div>
      </div>
      <span class="${colorClass}">${t.amount}</span>
    `;

    let startX = 0;
    let currentX = 0;

    div.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    });

    div.addEventListener('touchmove', e => {
      currentX = e.touches[0].clientX;
      let diff = currentX - startX;

      if (diff < 0) {
        div.style.transform = `translateX(${diff}px)`;
      }
    });

    div.addEventListener('touchend', () => {
      let diff = currentX - startX;

      if (diff < -80) {
        div.style.transform = `translateX(-80px)`;
      } else {
        div.style.transform = `translateX(0px)`;
      }
    });

    wrapper.appendChild(del);
    wrapper.appendChild(div);
    list.appendChild(wrapper);
  });

  balance.innerText = total + ' ₽';
}

function openModal() {
  document.getElementById('modalBg').style.display = 'block';
}

function closeModal() {
  document.getElementById('modalBg').style.display = 'none';
}

function save() {
  const name = document.getElementById('name').value;
  const category = document.getElementById('category').value;
  const amount = parseInt(document.getElementById('amount').value);

  if (!name || !amount) return;

  transactions.push({ name, category, amount });

  localStorage.setItem('tx', JSON.stringify(transactions));

  document.getElementById('name').value = '';
  document.getElementById('amount').value = '';

  closeModal();
  render();
}

function deleteItem(index) {
  transactions.splice(index, 1);
  localStorage.setItem('tx', JSON.stringify(transactions));
  render();
}

render();
</script>

</body>
</html>
