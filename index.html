<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансы</title>

<link rel="stylesheet" href="style.css?v=4">
</head>
<body>

<div class="app">
  <h1>Финансы</h1>

  <!-- Тип -->
  <div class="input-group">
    <select id="walletType" onchange="toggleIncomeField()">
      <option value="cash">Наличные</option>
      <option value="card">Карта</option>
      <option value="invest">Инвестиции</option>
      <option value="debt">Долг</option>
    </select>
  </div>

  <!-- Основные поля -->
  <div class="input-group">
    <input id="walletName" placeholder="Название">
    <input id="walletAmount" type="number" placeholder="Сумма">
  </div>

  <!-- Доход -->
  <div class="input-group" id="incomeGroup" style="display:none;">
    <input id="walletIncome" type="number" placeholder="Ежемесячный доход">
  </div>

  <button onclick="addWallet()">Добавить</button>

  <!-- Итоги -->
  <div class="totals">
    Общая сумма: <span id="walletTotal">0</span><br>
    Доход/мес: <span id="monthlyIncome">0</span>
  </div>

  <div id="walletList"></div>
</div>

<nav>
  <a href="index.html">Финансы</a>
  <a href="credits.html">Кредитки</a>
  <a href="subs.html">Расходы</a>
</nav>

<script src="app.js?v=4"></script>
</body>
</html>
