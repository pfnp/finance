<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>Credit Manager</h1>

  <div class="input-group">
    <input id="cardName" placeholder="Карта">
    <input id="amount" type="number" placeholder="Долг">
    <input id="limit" type="number" placeholder="Лимит">
    <input id="dueDate" type="date" placeholder="Дата погашения">
    <button onclick="addCard()">+</button>
  </div>

  <div class="stats">
    <div id="totalDebt">0 ₽</div>
    <div id="totalFree">0 ₽</div>
  </div>

  <div id="cardList"></div>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>Редактировать карту</h3>
    <input id="editAmount" type="number" placeholder="Долг">
    <input id="editLimit" type="number" placeholder="Лимит">
    <input id="editDueDate" type="date" placeholder="Дата погашения">
    <button onclick="saveEdit()">Сохранить</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
