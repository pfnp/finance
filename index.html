<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Финансы">
  <meta name="theme-color" content="#FFFFFF" id="theme-color-meta">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23007AFF'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E💰%3C/text%3E%3C/svg%3E">
  <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23007AFF'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E💰%3C/text%3E%3C/svg%3E">
  <title>Финансы — личный учёт</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-primary: #F2F2F7;
      --bg-card: #FFFFFF;
      --text-primary: #000000;
      --text-secondary: #6C6C70;
      --tab-bar-bg: rgba(255,255,255,0.96);
      --tab-bar-border: rgba(0,0,0,0.1);
      --tab-inactive: #8E8E93;
      --tab-active: #007AFF;
      --tab-active-bg: rgba(0,122,255,0.1);
      --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
      --total-bg: #FFFFFF;
      --total-border: rgba(0,0,0,0.05);
      --detail-bg: #F2F2F7;
      --modal-bg: #FFFFFF;
      --input-bg: #F9F9FB;
      --input-border: #E5E5EA;
      --btn-cancel-bg: #E5E5EA;
    }

    body.dark {
      --bg-primary: #000000;
      --bg-card: #1C1C1E;
      --text-primary: #FFFFFF;
      --text-secondary: #8E8E93;
      --tab-bar-bg: rgba(28,28,30,0.96);
      --tab-bar-border: rgba(255,255,255,0.1);
      --tab-inactive: #8E8E93;
      --tab-active: #0A84FF;
      --tab-active-bg: rgba(10,132,255,0.2);
      --card-shadow: 0 4px 12px rgba(0,0,0,0.3);
      --total-bg: #1C1C1E;
      --total-border: rgba(255,255,255,0.1);
      --detail-bg: #2C2C2E;
      --modal-bg: #1C1C1E;
      --input-bg: #2C2C2E;
      --input-border: #3A3A3C;
      --btn-cancel-bg: #2C2C2E;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding-top: env(safe-area-inset-top, 20px);
      padding-bottom: calc(70px + env(safe-area-inset-bottom, 0px));
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 80px;
    }

    /* Заголовки по центру, кнопки слева/справа */
    .section-header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }
    .section-header h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin: 0;
    }
    .header-left {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }
    .header-right {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
    }
    .theme-toggle, .add-button-header {
      width: 44px;
      height: 44px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: none;
      cursor: pointer;
      transition: 0.2s;
      background: var(--bg-card);
      box-shadow: var(--card-shadow);
      color: var(--text-primary);
    }
    .theme-toggle:active, .add-button-header:active {
      transform: scale(0.94);
    }
    .add-button-header {
      background: #007AFF;
      color: white;
      box-shadow: 0 2px 8px rgba(0,122,255,0.3);
    }
    body.dark .add-button-header {
      background: #0A84FF;
    }

    /* Нижняя навигация */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--tab-bar-bg);
      backdrop-filter: blur(10px);
      border-top: 0.5px solid var(--tab-bar-border);
      display: flex;
      justify-content: space-around;
      padding: 8px 20px 20px;
      z-index: 20;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      color: var(--tab-inactive);
      background: none;
      border: none;
      padding: 8px 16px;
      transition: 0.2s;
      cursor: pointer;
      border-radius: 30px;
      min-width: 70px;
    }
    .tab-item.active {
      color: var(--tab-active);
      background: var(--tab-active-bg);
    }
    .tab-icon {
      font-size: 24px;
    }

    /* Анимация смены страниц */
    .section {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .section.active-section {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    /* Уменьшенные карточки */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .card-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
    }
    .card-swipe-container {
      position: relative;
      width: 100%;
      border-radius: 20px;
    }
    .card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 12px 14px;
      box-shadow: var(--card-shadow);
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      position: relative;
      z-index: 2;
    }
    .delete-button {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 80px;
      background: #FF3B30;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1;
      opacity: 0;
      transform: translateX(100%);
    }
    .card-wrapper.swiped .delete-button {
      opacity: 1;
      transform: translateX(0);
    }
    .card-title {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 8px;
    }
    .card-details {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }
    .card-details span {
      background: var(--detail-bg);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
    }

    /* Блоки итогов */
    .totals-grid {
      display: flex;
      gap: 12px;
      margin: 16px 0 24px;
    }
    .total-block {
      flex: 1;
      background: var(--total-bg);
      border-radius: 24px;
      padding: 16px 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      border: 0.5px solid var(--total-border);
    }
    .total-label {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .total-amount {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .single-total {
      margin: 16px 0 24px;
    }

    /* Модалка */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-content {
      background: var(--modal-bg);
      width: 90%;
      max-width: 360px;
      border-radius: 28px;
      padding: 24px 20px 20px;
      box-shadow: 0 24px 40px rgba(0,0,0,0.2);
    }
    .modal-content h3 {
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
    }
    .modal-field {
      margin-bottom: 16px;
    }
    .modal-field label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 6px;
    }
    .modal-field input, .modal-field select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--input-border);
      border-radius: 14px;
      font-size: 16px;
      background: var(--input-bg);
      color: var(--text-primary);
      font-family: inherit;
    }
    input[type="date"] {
      width: 100%;
    }
    .modal-buttons {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 24px;
    }
    .modal-buttons button {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 17px;
      border: none;
      cursor: pointer;
    }
    .btn-cancel {
      background: var(--btn-cancel-bg);
      color: var(--tab-active);
    }
    .btn-save {
      background: #007AFF;
      color: white;
    }
    body.dark .btn-save {
      background: #0A84FF;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Финансы -->
  <div id="financesSection" class="section active-section">
    <div class="section-header">
      <div class="header-left"><button class="theme-toggle" id="themeToggle">🌙</button></div>
      <h1>Финансы</h1>
      <div class="header-right"><button class="add-button-header" data-add="finances">+</button></div>
    </div>
    <div class="totals-grid">
      <div class="total-block"><div class="total-label">Общий баланс</div><div class="total-amount" id="totalFinance">0 ₽</div></div>
      <div class="total-block"><div class="total-label">Доход в месяц</div><div class="total-amount" id="totalIncome">0 ₽</div></div>
    </div>
    <div id="financesList" class="card-list"></div>
  </div>

  <!-- Кредитки -->
  <div id="creditSection" class="section">
    <div class="section-header">
      <div class="header-left"><button class="theme-toggle" id="themeToggle2">🌙</button></div>
      <h1>Кредитки</h1>
      <div class="header-right"><button class="add-button-header" data-add="credits">+</button></div>
    </div>
    <div class="totals-grid">
      <div class="total-block"><div class="total-label">Общий долг</div><div class="total-amount" id="totalDebt">0 ₽</div></div>
      <div class="total-block"><div class="total-label">Остаток по лимитам</div><div class="total-amount" id="totalRemaining">0 ₽</div></div>
    </div>
    <div id="creditList" class="card-list"></div>
  </div>

  <!-- Расходы -->
  <div id="subscriptionSection" class="section">
    <div class="section-header">
      <div class="header-left"><button class="theme-toggle" id="themeToggle3">🌙</button></div>
      <h1>Расходы</h1>
      <div class="header-right"><button class="add-button-header" data-add="subscriptions">+</button></div>
    </div>
    <div class="total-block single-total"><div class="total-label">Расходов в месяц</div><div class="total-amount" id="totalSubs">0 ₽</div></div>
    <div id="subscriptionList" class="card-list"></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-item" data-tab="subscriptions"><span class="tab-icon">📋</span><span>Расходы</span></button>
  <button class="tab-item active" data-tab="finances"><span class="tab-icon">💰</span><span>Финансы</span></button>
  <button class="tab-item" data-tab="credits"><span class="tab-icon">💳</span><span>Кредитки</span></button>
</div>

<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
  // ---------- STORAGE KEYS ----------
  const STORAGE = {
    finances: 'finance_app_final',
    credits: 'credits_app_final',
    subscriptions: 'subscriptions_app_final',
    theme: 'app_theme_final'
  };

  let finances = [], credits = [], subscriptions = [];
  let currentTab = 'finances';
  let modalState = { mode: 'add', type: 'finance', id: null };

  // DOM
  const financesDiv = document.getElementById('financesList');
  const creditDiv = document.getElementById('creditList');
  const subscriptionDiv = document.getElementById('subscriptionList');
  const totalFinanceSpan = document.getElementById('totalFinance');
  const totalIncomeSpan = document.getElementById('totalIncome');
  const totalDebtSpan = document.getElementById('totalDebt');
  const totalRemainingSpan = document.getElementById('totalRemaining');
  const totalSubsSpan = document.getElementById('totalSubs');
  const modal = document.getElementById('modal');
  const modalContent = document.getElementById('modalContent');

  // ---------- Тёмная тема ----------
  function initTheme() {
    const savedTheme = localStorage.getItem(STORAGE.theme);
    if (savedTheme === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('theme-color-meta')?.setAttribute('content', '#000000');
      updateThemeIcons('☀️');
    } else {
      document.body.classList.remove('dark');
      document.getElementById('theme-color-meta')?.setAttribute('content', '#FFFFFF');
      updateThemeIcons('🌙');
    }
  }
  function updateThemeIcons(icon) {
    document.querySelectorAll('.theme-toggle').forEach(btn => btn.textContent = icon);
  }
  function toggleTheme() {
    if (document.body.classList.contains('dark')) {
      document.body.classList.remove('dark');
      localStorage.setItem(STORAGE.theme, 'light');
      document.getElementById('theme-color-meta')?.setAttribute('content', '#FFFFFF');
      updateThemeIcons('🌙');
    } else {
      document.body.classList.add('dark');
      localStorage.setItem(STORAGE.theme, 'dark');
      document.getElementById('theme-color-meta')?.setAttribute('content', '#000000');
      updateThemeIcons('☀️');
    }
  }

  // ---------- Данные ----------
  function loadData() {
    const savedFin = localStorage.getItem(STORAGE.finances);
    const savedCred = localStorage.getItem(STORAGE.credits);
    const savedSub = localStorage.getItem(STORAGE.subscriptions);
    finances = savedFin ? JSON.parse(savedFin) : [];
    credits = savedCred ? JSON.parse(savedCred) : [];
    subscriptions = savedSub ? JSON.parse(savedSub) : [];

    if (finances.length === 0) {
      finances = [
        { id: Date.now()+1, name: "Наличные", amount: 15000, type: "cash", monthlyIncome: null },
        { id: Date.now()+2, name: "Акции", amount: 50000, type: "investments", monthlyIncome: 1200 },
        { id: Date.now()+3, name: "Друг долг", amount: 3000, type: "debt", monthlyIncome: null }
      ];
    }
    if (credits.length === 0) {
      credits = [
        { id: Date.now()+4, name: "Тинькофф", limit: 100000, debt: 25000, dueDate: getFutureDate(5) },
        { id: Date.now()+5, name: "СберКарта", limit: 70000, debt: 12000, dueDate: getFutureDate(2) }
      ];
    }
    if (subscriptions.length === 0) {
      subscriptions = [
        { id: Date.now()+6, name: "Netflix", amount: 799, dueDate: getFutureDateForSub(15) },
        { id: Date.now()+7, name: "YouTube Premium", amount: 399, dueDate: getFutureDateForSub(8) }
      ];
    }
    saveAll();
  }
  function getFutureDate(days) { const d = new Date(); d.setDate(d.getDate() + days); return d.toISOString().slice(0,10); }
  function getFutureDateForSub(dayOfMonth) {
    const today = new Date();
    let target = new Date(today.getFullYear(), today.getMonth(), dayOfMonth);
    if (target < today) target = new Date(today.getFullYear(), today.getMonth() + 1, dayOfMonth);
    return target.toISOString().slice(0,10);
  }
  function saveAll() {
    localStorage.setItem(STORAGE.finances, JSON.stringify(finances));
    localStorage.setItem(STORAGE.credits, JSON.stringify(credits));
    localStorage.setItem(STORAGE.subscriptions, JSON.stringify(subscriptions));
  }

  // Сортировки
  function sortFinances(arr) {
    const order = { investments: 1, card: 2, cash: 3, debt: 4 };
    return [...arr].sort((a,b) => {
      if (order[a.type] !== order[b.type]) return order[a.type] - order[b.type];
      return b.amount - a.amount;
    });
  }
  function sortCredits(arr) {
    const today = new Date(); today.setHours(0,0,0,0);
    return [...arr].sort((a,b) => {
      const daysA = daysUntilDue(a.dueDate);
      const daysB = daysUntilDue(b.dueDate);
      if (daysA < 0 && daysB >= 0) return -1;
      if (daysB < 0 && daysA >= 0) return 1;
      return daysA - daysB;
    });
  }
  function sortSubscriptions(arr) {
    return [...arr].sort((a,b) => daysUntilDate(a.dueDate) - daysUntilDate(b.dueDate));
  }
  function daysUntilDue(dateStr) { const due = new Date(dateStr); const today = new Date(); today.setHours(0,0,0,0); return Math.ceil((due - today) / (1000*3600*24)); }
  function daysUntilDate(dateStr) { const target = new Date(dateStr); const today = new Date(); today.setHours(0,0,0,0); return Math.ceil((target - today) / (1000*3600*24)); }

  // Итоги
  function updateFinanceTotals() {
    let total = 0, monthlyIncome = 0;
    finances.forEach(f => {
      if (f.type === 'debt') total -= f.amount;
      else total += f.amount;
      if (f.type === 'investments' && f.monthlyIncome) monthlyIncome += f.monthlyIncome;
    });
    totalFinanceSpan.innerText = total.toLocaleString('ru-RU') + ' ₽';
    totalIncomeSpan.innerText = monthlyIncome.toLocaleString('ru-RU') + ' ₽';
  }
  function updateCreditTotals() {
    let totalDebt = 0, totalRemaining = 0;
    credits.forEach(c => { totalDebt += c.debt; totalRemaining += (c.limit - c.debt); });
    totalDebtSpan.innerText = totalDebt.toLocaleString('ru-RU') + ' ₽';
    totalRemainingSpan.innerText = totalRemaining.toLocaleString('ru-RU') + ' ₽';
  }
  function updateSubscriptionTotals() {
    const total = subscriptions.reduce((s,sub) => s + sub.amount, 0);
    totalSubsSpan.innerText = total.toLocaleString('ru-RU') + ' ₽';
  }

  // Универсальный свайп
  function makeSwipeable(cardElement, deleteButton, onDelete) {
    let startX = 0, currentTranslate = 0, isSwiping = false, autoCloseTimer = null;
    const wrapper = cardElement.closest('.card-wrapper');
    function closeSwipe() {
      if (autoCloseTimer) clearTimeout(autoCloseTimer);
      cardElement.style.transform = 'translateX(0px)';
      currentTranslate = 0;
      if (wrapper) wrapper.classList.remove('swiped');
    }
    function openSwipe() {
      if (autoCloseTimer) clearTimeout(autoCloseTimer);
      cardElement.style.transform = 'translateX(-80px)';
      currentTranslate = -80;
      if (wrapper) wrapper.classList.add('swiped');
      autoCloseTimer = setTimeout(() => closeSwipe(), 2000);
    }
    cardElement.addEventListener('touchstart', (e) => {
      if (autoCloseTimer) clearTimeout(autoCloseTimer);
      startX = e.touches[0].clientX;
      isSwiping = true;
      cardElement.style.transition = 'none';
    });
    cardElement.addEventListener('touchmove', (e) => {
      if (!isSwiping) return;
      const diff = e.touches[0].clientX - startX;
      if (diff < 0) {
        let translate = Math.max(-80, diff);
        cardElement.style.transform = `translateX(${translate}px)`;
        currentTranslate = translate;
      } else if (currentTranslate < 0 && diff > 0) {
        let translate = Math.min(0, currentTranslate + diff);
        cardElement.style.transform = `translateX(${translate}px)`;
        currentTranslate = translate;
      }
    });
    cardElement.addEventListener('touchend', () => {
      isSwiping = false;
      cardElement.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
      if (currentTranslate < -40) openSwipe();
      else closeSwipe();
    });
    deleteButton.addEventListener('click', (e) => { e.stopPropagation(); if (autoCloseTimer) clearTimeout(autoCloseTimer); onDelete(); });
    cardElement.addEventListener('click', (e) => { if (currentTranslate === -80) { closeSwipe(); e.stopPropagation(); } });
    return { closeSwipe };
  }

  // Рендер карточек
  function renderFinances() {
    const sorted = sortFinances(finances);
    updateFinanceTotals();
    financesDiv.innerHTML = '';
    sorted.forEach(f => financesDiv.appendChild(createFinanceCard(f)));
  }
  function createFinanceCard(item) {
    const wrapper = document.createElement('div'); wrapper.className = 'card-wrapper';
    const swipeContainer = document.createElement('div'); swipeContainer.className = 'card-swipe-container';
    const cardDiv = document.createElement('div'); cardDiv.className = 'card';
    let typeLabel = item.type === 'cash' ? 'Наличные' : item.type === 'card' ? 'Карта' : item.type === 'investments' ? 'Инвестиции' : 'Долг';
    let incomeHtml = (item.type === 'investments' && item.monthlyIncome) ? `<span>📈 +${item.monthlyIncome} ₽/мес</span>` : '';
    cardDiv.innerHTML = `<div class="card-title">${escapeHtml(item.name)}</div><div class="card-details"><span>💰 ${item.amount.toLocaleString('ru-RU')} ₽</span><span>📌 ${typeLabel}</span>${incomeHtml}</div>`;
    const deleteBtn = document.createElement('div'); deleteBtn.className = 'delete-button'; deleteBtn.innerText = 'Удалить';
    swipeContainer.appendChild(cardDiv); swipeContainer.appendChild(deleteBtn); wrapper.appendChild(swipeContainer);
    const { closeSwipe } = makeSwipeable(cardDiv, deleteBtn, () => { finances = finances.filter(f => f.id !== item.id); saveAll(); renderFinances(); });
    cardDiv.addEventListener('click', () => { closeSwipe(); openEditModal('finance', item.id); });
    return wrapper;
  }
  function renderCredits() {
    const sorted = sortCredits(credits);
    updateCreditTotals();
    creditDiv.innerHTML = '';
    sorted.forEach(c => creditDiv.appendChild(createCreditCard(c)));
  }
  function createCreditCard(item) {
    const wrapper = document.createElement('div'); wrapper.className = 'card-wrapper';
    const swipeContainer = document.createElement('div'); swipeContainer.className = 'card-swipe-container';
    const cardDiv = document.createElement('div'); cardDiv.className = 'card';
    const remaining = item.limit - item.debt;
    const days = daysUntilDue(item.dueDate);
    const daysText = days < 0 ? `Просрочено ${-days} дн.` : `${days} дн.`;
    cardDiv.innerHTML = `<div class="card-title">${escapeHtml(item.name)}</div><div class="card-details"><span>💸 долг: ${item.debt.toLocaleString('ru-RU')} ₽</span><span>💳 остаток: ${remaining.toLocaleString('ru-RU')} ₽</span><span>📅 ${daysText}</span></div>`;
    const deleteBtn = document.createElement('div'); deleteBtn.className = 'delete-button'; deleteBtn.innerText = 'Удалить';
    swipeContainer.appendChild(cardDiv); swipeContainer.appendChild(deleteBtn); wrapper.appendChild(swipeContainer);
    const { closeSwipe } = makeSwipeable(cardDiv, deleteBtn, () => { credits = credits.filter(c => c.id !== item.id); saveAll(); renderCredits(); });
    cardDiv.addEventListener('click', () => { closeSwipe(); openEditModal('credit', item.id); });
    return wrapper;
  }
  function renderSubscriptions() {
    const sorted = sortSubscriptions(subscriptions);
    updateSubscriptionTotals();
    subscriptionDiv.innerHTML = '';
    sorted.forEach(s => subscriptionDiv.appendChild(createSubCard(s)));
  }
  function createSubCard(item) {
    const wrapper = document.createElement('div'); wrapper.className = 'card-wrapper';
    const swipeContainer = document.createElement('div'); swipeContainer.className = 'card-swipe-container';
    const cardDiv = document.createElement('div'); cardDiv.className = 'card';
    const days = daysUntilDate(item.dueDate);
    const daysText = days === 0 ? 'Сегодня' : (days < 0 ? `Просрочено на ${-days} дн.` : `${days} дн.`);
    cardDiv.innerHTML = `<div class="card-title">${escapeHtml(item.name)}</div><div class="card-details"><span>💵 ${item.amount.toLocaleString('ru-RU')} ₽</span><span>📆 через ${daysText}</span></div>`;
    const deleteBtn = document.createElement('div'); deleteBtn.className = 'delete-button'; deleteBtn.innerText = 'Удалить';
    swipeContainer.appendChild(cardDiv); swipeContainer.appendChild(deleteBtn); wrapper.appendChild(swipeContainer);
    const { closeSwipe } = makeSwipeable(cardDiv, deleteBtn, () => { subscriptions = subscriptions.filter(s => s.id !== item.id); saveAll(); renderSubscriptions(); });
    cardDiv.addEventListener('click', () => { closeSwipe(); openEditModal('subscription', item.id); });
    return wrapper;
  }

  // Модалки
  function openAddModal(type) { modalState = { mode: 'add', type, id: null }; buildModalForm(); modal.classList.add('active'); }
  function openEditModal(type, id) { modalState = { mode: 'edit', type, id }; buildModalForm(); modal.classList.add('active'); }
  function buildModalForm() {
    const { mode, type, id } = modalState;
    let html = `<h3>${mode === 'add' ? 'Добавить' : 'Редактировать'}</h3>`;
    if (type === 'finance') {
      const item = mode === 'edit' ? finances.find(f => f.id === id) : null;
      html += `<div class="modal-field"><label>Название</label><input id="finName" value="${item ? escapeHtml(item.name) : ''}"></div>
               <div class="modal-field"><label>Сумма (₽)</label><input id="finAmount" type="number" value="${item ? item.amount : ''}"></div>
               <div class="modal-field"><label>Тип</label><select id="finType"><option value="cash" ${item?.type === 'cash' ? 'selected' : ''}>Наличные</option><option value="card" ${item?.type === 'card' ? 'selected' : ''}>Карта</option><option value="investments" ${item?.type === 'investments' ? 'selected' : ''}>Инвестиции</option><option value="debt" ${item?.type === 'debt' ? 'selected' : ''}>Долг</option></select></div>
               <div class="modal-field" id="incomeField" style="${item?.type === 'investments' ? '' : 'display:none'}"><label>Ежемесячный доход (₽)</label><input id="monthlyIncome" type="number" value="${item?.monthlyIncome || ''}"></div>`;
    } else if (type === 'credit') {
      const item = mode === 'edit' ? credits.find(c => c.id === id) : null;
      html += `<div class="modal-field"><label>Название</label><input id="credName" value="${item ? escapeHtml(item.name) : ''}"></div>
               <div class="modal-field"><label>Лимит (₽)</label><input id="credLimit" type="number" value="${item ? item.limit : ''}"></div>
               <div class="modal-field"><label>Долг (₽)</label><input id="credDebt" type="number" value="${item ? item.debt : ''}"></div>
               <div class="modal-field"><label>Дата погашения</label><input id="credDue" type="date" value="${item ? item.dueDate : ''}"></div>`;
    } else {
      const item = mode === 'edit' ? subscriptions.find(s => s.id === id) : null;
      html += `<div class="modal-field"><label>Название</label><input id="subName" value="${item ? escapeHtml(item.name) : ''}"></div>
               <div class="modal-field"><label>Сумма (₽)</label><input id="subAmount" type="number" value="${item ? item.amount : ''}"></div>
               <div class="modal-field"><label>Дата списания</label><input id="subDueDate" type="date" value="${item ? item.dueDate : ''}"></div>`;
    }
    html += `<div class="modal-buttons"><button class="btn-cancel" id="cancelModal">Отмена</button><button class="btn-save" id="saveModal">Сохранить</button></div>`;
    modalContent.innerHTML = html;
    if (type === 'finance') {
      const typeSelect = document.getElementById('finType');
      const incomeDiv = document.getElementById('incomeField');
      typeSelect?.addEventListener('change', () => { incomeDiv.style.display = typeSelect.value === 'investments' ? 'block' : 'none'; });
    }
    document.getElementById('cancelModal')?.addEventListener('click', () => modal.classList.remove('active'));
    document.getElementById('saveModal')?.addEventListener('click', () => saveModalHandler());
  }
  function saveModalHandler() {
    const { mode, type, id } = modalState;
    if (type === 'finance') {
      const name = document.getElementById('finName').value.trim();
      const amount = parseFloat(document.getElementById('finAmount').value);
      const finType = document.getElementById('finType').value;
      const monthlyIncome = finType === 'investments' ? parseFloat(document.getElementById('monthlyIncome')?.value || 0) : null;
      if (!name || isNaN(amount)) return;
      if (mode === 'add') finances.push({ id: Date.now(), name, amount, type: finType, monthlyIncome: monthlyIncome && !isNaN(monthlyIncome) ? monthlyIncome : null });
      else { const idx = finances.findIndex(f => f.id === id); if (idx !== -1) finances[idx] = { ...finances[idx], name, amount, type: finType, monthlyIncome }; }
      saveAll(); renderFinances();
    } else if (type === 'credit') {
      const name = document.getElementById('credName').value.trim();
      const limit = parseFloat(document.getElementById('credLimit').value);
      const debt = parseFloat(document.getElementById('credDebt').value);
      const dueDate = document.getElementById('credDue').value;
      if (!name || isNaN(limit) || isNaN(debt) || !dueDate) return;
      if (mode === 'add') credits.push({ id: Date.now(), name, limit, debt, dueDate });
      else { const idx = credits.findIndex(c => c.id === id); if (idx !== -1) credits[idx] = { ...credits[idx], name, limit, debt, dueDate }; }
      saveAll(); renderCredits();
    } else {
      const name = document.getElementById('subName').value.trim();
      const amount = parseFloat(document.getElementById('subAmount').value);
      const dueDate = document.getElementById('subDueDate').value;
      if (!name || isNaN(amount) || !dueDate) return;
      if (mode === 'add') subscriptions.push({ id: Date.now(), name, amount, dueDate });
      else { const idx = subscriptions.findIndex(s => s.id === id); if (idx !== -1) subscriptions[idx] = { ...subscriptions[idx], name, amount, dueDate }; }
      saveAll(); renderSubscriptions();
    }
    modal.classList.remove('active');
    if (currentTab === 'finances') renderFinances();
    else if (currentTab === 'credits') renderCredits();
    else renderSubscriptions();
  }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  // Навигация
  function switchTab(tabId) {
    currentTab = tabId;
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active-section'));
    setTimeout(() => {
      if (tabId === 'finances') document.getElementById('financesSection').classList.add('active-section');
      else if (tabId === 'credits') document.getElementById('creditSection').classList.add('active-section');
      else document.getElementById('subscriptionSection').classList.add('active-section');
    }, 10);
    document.querySelectorAll('.tab-item').forEach(btn => btn.classList.remove('active'));
    const activeBtn = document.querySelector(`.tab-item[data-tab="${tabId}"]`);
    if (activeBtn) activeBtn.classList.add('active');
    if (tabId === 'finances') renderFinances();
    else if (tabId === 'credits') renderCredits();
    else renderSubscriptions();
  }

  // PWA
  function registerServiceWorker() {
    if ('serviceWorker' in navigator) {
      const swCode = `const CACHE_NAME = 'finance_pwa_final'; const urlsToCache = ['./']; self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))); self.skipWaiting(); }); self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(response => response || fetch(e.request))); }); self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.map(key => { if (key !== CACHE_NAME) return caches.delete(key); })))); self.clients.claim(); });`;
      const blob = new Blob([swCode], {type: 'application/javascript'});
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).then(reg => { console.log('SW registered'); reg.update(); }).catch(err => console.log(err));
    }
  }
  function generateManifest() {
    const manifest = { name: "Финансы", short_name: "Финансы", start_url: ".", display: "standalone", theme_color: "#FFFFFF", background_color: "#FFFFFF", icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23007AFF'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white'%3E💰%3C/text%3E%3C/svg%3E", sizes: "any", type: "image/svg+xml" }] };
    const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(manifestBlob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);
  }

  function init() {
    loadData();
    initTheme();
    renderFinances(); renderCredits(); renderSubscriptions();
    document.querySelectorAll('.add-button-header').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const type = btn.getAttribute('data-add');
        if (type === 'finances') openAddModal('finance');
        else if (type === 'credits') openAddModal('credit');
        else if (type === 'subscriptions') openAddModal('subscription');
      });
    });
    document.querySelectorAll('.tab-item').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
    document.querySelectorAll('.theme-toggle').forEach(btn => btn.addEventListener('click', toggleTheme));
    generateManifest();
    registerServiceWorker();
  }
  init();
</script>
</body>
</html>
