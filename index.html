<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансы</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">Финансы</div>
<div class="balance" id="balance">0 ₽</div>
<div class="add-btn" onclick="openModal()">Добавить</div>
<div class="list" id="list"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <input id="name" placeholder="Название">
    <select id="category">
      <option>Еда</option>
      <option>Транспорт</option>
      <option>Подписки</option>
      <option>Развлечения</option>
      <option>Другое</option>
    </select>
    <input id="amount" placeholder="Сумма (+ доход / - расход)">
    <div class="save" onclick="save()">Сохранить</div>
  </div>
</div>

<div class="tabbar">
  <a class="tab active" href="index.html">Операции</a>
  <a class="tab" href="subscriptions.html">Подписки</a>
  <a class="tab" href="cards.html">Карты</a>
</div>

<script src="app.js"></script>
</body>
</html>
