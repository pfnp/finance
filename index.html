<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Финансы</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Финансы</div>
<div class="balance" id="balance">0 ₽</div>
<div class="add-btn" onclick="openModal()">Добавить кошелёк</div>
<div class="list" id="walletList"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <input id="walletName" placeholder="Название кошелька">
    <select id="walletType">
      <option>Карта</option>
      <option>Наличные</option>
      <option>Инвестиции</option>
      <option>Долг</option>
    </select>
    <input id="walletAmount" placeholder="Сумма">
    <div class="save" onclick="saveWallet()">Сохранить</div>
  </div>
</div>

<div class="tabbar">
  <a class="tab active" href="index.html">Финансы</a>
  <a class="tab" href="subscriptions.html">Подписки</a>
  <a class="tab" href="cards.html">Карты</a>
</div>

<script>
let wallets = JSON.parse(localStorage.getItem('wallets')) || [];

function openModal(){document.getElementById('modalBg').style.display='block';}
function closeModal(){document.getElementById('modalBg').style.display='none';}

function renderWallets(){
  const list = document.getElementById('walletList');
  list.innerHTML = '';
  let total = 0;

  wallets.forEach((w, i)=>{
    total += w.amount;

    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div>${w.name} (${w.type})</div><span>${w.amount} ₽</span>`;

    const del = document.createElement('div');
    del.className = 'delete';
    del.innerText = 'Удалить';
    del.onclick = ()=>deleteWallet(i);

    const wrapper = document.createElement('div');
    wrapper.className = 'wrapper';
    wrapper.appendChild(del);
    wrapper.appendChild(div);

    list.appendChild(wrapper);
  });

  document.getElementById('balance').innerText = total + ' ₽';
}

function saveWallet(){
  const name = document.getElementById('walletName').value;
  const type = document.getElementById('walletType').value;
  const amount = parseInt(document.getElementById('walletAmount').value);
  if(!name || isNaN(amount)) return;

  wallets.push({name, type, amount});
  localStorage.setItem('wallets', JSON.stringify(wallets));

  document.getElementById('walletName').value='';
  document.getElementById('walletAmount').value='';
  closeModal();
  renderWallets();
}

function deleteWallet(index){
  wallets.splice(index,1);
  localStorage.setItem('wallets', JSON.stringify(wallets));
  renderWallets();
}

renderWallets();
</script>
</body>
</html>
