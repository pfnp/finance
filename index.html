<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер кредитных карт</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>Трекер кредиток</h1>

  <div class="input-group">
    <input id="cardName" placeholder="Название карты" />
    <input id="amount" type="number" placeholder="Долг" />
    <input id="limit" type="number" placeholder="Остаток лимита" />
    <input id="days" type="number" placeholder="Дней осталось" />
    <button onclick="addDebt()">+</button>
  </div>

  <div id="total">Общий долг: 0 ₽</div>

  <canvas id="chart" width="300" height="300"></canvas>

  <ul id="debtList"></ul>
</div>

<script src="script.js" defer></script>
</body>
</html>
